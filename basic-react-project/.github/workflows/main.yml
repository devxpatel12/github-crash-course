name: CI
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      # "uses" and "name" are fields in a GitHub Actions workflow step.
      # "uses" specifies a GitHub Action to use; here, it refers to the official checkout action (not a reserved keyword).
      - name: Get Code
      - uses: actions/checkout@v4
      # "name" lets you provide a display name for the step. "Setup Node.js" is not a reserved keyword, but a custom label for clarity.
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      # "run" is a command to execute in the step. It runs the npm ci command to install dependencies.
      - name: Install dependencies
        run: npm ci
      # "run" is a command to execute in the step. It runs the npm run lint command to lint the code.
      - name: Lint
        run: npm run lint
      # "run" is a command to execute in the step. It runs the npm run typecheck command to typecheck the code.
      - name: Typecheck
        run: npm run typecheck
