<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background-color: #f5f5f5;
        }
        
        h1 {
            color: #333;
            text-align: center;
            border-bottom: 3px solid #4CAF50;
            padding-bottom: 10px;
        }
        
        a {
            display: inline-block;
            margin: 20px 0;
            color: #2196F3;
            text-decoration: none;
            font-size: 18px;
        }
        
        a:hover {
            color: #0b7dda;
            text-decoration: underline;
        }
        
        ul {
            background-color: white;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        li {
            margin: 10px 0;
            padding: 8px;
            list-style-type: square;
            color: #555;
        }
        
        li:hover {
            background-color: #f0f0f0;
            border-left: 3px solid #4CAF50;
            padding-left: 15px;
        }
    </style>
</head>
<body>
    <h1>Welcome to My Basic Site</h1>
    
    <a href="https://www.example.com">Visit Example.com</a>
    
    <ul>
        <li>First item</li>
        <li>Second item</li>
        <li>Third item</li>
        <li>Fourth item</li>
        <li>Fifth item</li>
    </ul>
</body>
</html>
